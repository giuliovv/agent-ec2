<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent EC2 MVP</title>
  <style>
    :root { --bg:#0b1220; --card:#111a2b; --fg:#e8eefc; --muted:#95a4c8; --ok:#13c296; --warn:#f4b740; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; background: radial-gradient(circle at 20% 10%, #1a2844, var(--bg)); color: var(--fg); }
    .wrap { max-width: 860px; margin: 40px auto; padding: 0 16px; }
    .card { background: var(--card); border: 1px solid #263450; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    input, button, textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #2f4063; background: #0f1728; color: var(--fg); }
    button { cursor: pointer; margin-top: 8px; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    pre { white-space: pre-wrap; overflow-wrap:anywhere; background:#0b1220; padding:10px; border-radius:8px; border:1px solid #2b3a59; }
    .muted { color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>Agent EC2 Lease MVP</h2>
      <p class="muted">HTTP 402 payment-gated lease flow (MVP stub)</p>
      <label>API Base URL</label>
      <input id="apiBase" value="http://localhost:8080" />
    </div>

    <div class="card">
      <h3>1) Create Lease</h3>
      <div class="row">
        <div><label>Agent ID</label><input id="agentId" value="codex-rpi-01" /></div>
        <div><label>Profile</label><input id="profile" value="cpu-small" /></div>
      </div>
      <div class="row">
        <div><label>Max Minutes</label><input id="maxMinutes" type="number" value="60" /></div>
        <div><label>Job Summary</label><input id="summary" value="Run heavy CI checks" /></div>
      </div>
      <button onclick="createLease()">Create Lease</button>
      <pre id="leaseOut"></pre>
    </div>

    <div class="card">
      <h3>2) Simulate Payment</h3>
      <label>Lease ID</label><input id="leaseId" placeholder="lease_xxx" />
      <button onclick="payLease()">POST /v1/pay/{lease_id}</button>
      <button onclick="pollLease()">GET /v1/leases/{lease_id}</button>
      <pre id="payOut"></pre>
    </div>

    <div class="card">
      <h3>3) Submit Job</h3>
      <label>Command</label><input id="command" value="bash run_heavy.sh" />
      <button onclick="submitJob()">Submit Job</button>
      <pre id="jobOut"></pre>
    </div>
  </div>

  <script>
    async function req(path, opts = {}) {
      const base = document.getElementById('apiBase').value.replace(/\/$/, '');
      const res = await fetch(base + path, { headers: { 'Content-Type': 'application/json' }, ...opts });
      const txt = await res.text();
      let body = txt; try { body = JSON.parse(txt); } catch {}
      return { status: res.status, body };
    }

    async function createLease() {
      const payload = {
        agent_id: document.getElementById('agentId').value,
        profile: document.getElementById('profile').value,
        max_minutes: Number(document.getElementById('maxMinutes').value),
        job_summary: document.getElementById('summary').value
      };
      const r = await req('/v1/leases', { method: 'POST', body: JSON.stringify(payload) });
      document.getElementById('leaseOut').textContent = JSON.stringify(r, null, 2);
      if (r.body.lease_id) document.getElementById('leaseId').value = r.body.lease_id;
    }

    async function payLease() {
      const leaseId = document.getElementById('leaseId').value;
      const r = await req('/v1/pay/' + leaseId, { method: 'POST', body: '{}' });
      document.getElementById('payOut').textContent = JSON.stringify(r, null, 2);
    }

    async function pollLease() {
      const leaseId = document.getElementById('leaseId').value;
      const r = await req('/v1/leases/' + leaseId);
      document.getElementById('payOut').textContent = JSON.stringify(r, null, 2);
    }

    async function submitJob() {
      const leaseId = document.getElementById('leaseId').value;
      const payload = { command: document.getElementById('command').value, env: { MODE: 'ci' } };
      const r = await req('/v1/leases/' + leaseId + '/jobs', { method: 'POST', body: JSON.stringify(payload) });
      document.getElementById('jobOut').textContent = JSON.stringify(r, null, 2);
    }
  </script>
</body>
</html>
